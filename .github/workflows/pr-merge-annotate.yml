name: PR merge — annotate linked issues

on:
  pull_request:
    types: [closed]

jobs:
  annotate-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Comment on linked issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            // Extract issue numbers from "Closes #N", "Fixes #N", "Resolves #N"
            const pattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const issues = new Set();
            let match;
            while ((match = pattern.exec(body)) \!== null) {
              issues.add(parseInt(match[1]));
            }
            // Also check commit messages
            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });
            for (const commit of commits.data) {
              const msg = commit.commit.message || "";
              let m;
              const p = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
              while ((m = p.exec(msg)) \!== null) {
                issues.add(parseInt(m[1]));
              }
            }
            if (issues.size === 0) {
              console.log("No linked issues found");
              return;
            }
            const labels = (pr.labels || []).map(l => l.name);
            const labelStr = labels.length > 0 ? labels.map(l => "`" + l + "`").join(", ") : "none";
            for (const num of issues) {
              const comment = [
                `## Resolved by #${pr.number}`,
                ``,
                `**PR**: [${pr.title}](${pr.html_url})`,
                `**Author**: @${pr.user.login}`,
                `**Branch**: \`${pr.head.ref}\` → \`${pr.base.ref}\``,
                `**Labels**: ${labelStr}`,
                `**Merged at**: ${pr.merged_at}`,
                ``,
                `<details><summary>Changes summary</summary>`,
                ``,
                `${body.split("## Verification")[0].trim()}`,
                ``,
                `</details>`,
              ].join("
");
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  body: comment,
                });
                // Add "resolved" label if not present
                try {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: num,
                    labels: ["enhancement"],
                  });
                } catch (e) { /* label may not exist */ }
                console.log("Commented on #" + num);
              } catch (e) {
                console.log("Failed to comment on #" + num + ": " + e.message);
              }
            }

