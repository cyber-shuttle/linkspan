name: Build release binaries
name: Release (goreleaser)

on:
  release:
    types: [published]

jobs:
  goreleaser:
    name: Run goreleaser on release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Run goreleaser (release)
        uses: goreleaser/goreleaser-action@v4
        with:
          version: latest
          args: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: set these if you want goreleaser to also push Homebrew PRs, snap, or sign artifacts
          # HOMEBREW_GITHUB_TOKEN: ${{ secrets.HOMEBREW_GITHUB_TOKEN }}
          # SNAPCRAFT_TOKEN: ${{ secrets.SNAPCRAFT_TOKEN }}
          # GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          # GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Upload goreleaser dist for debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: goreleaser-dist
          path: dist/**
          asset_name: ${{ github.event.release.tag_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}
          asset_content_type: application/octet-stream
