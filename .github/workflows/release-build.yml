name: Build release binaries

on:
  release:
    types: [published]

jobs:
  build:
    name: Build binaries for ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - name: linux-arm64
            runner: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - name: macos-amd64
            runner: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - name: macos-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - name: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
            archive: zip
          - name: windows-arm64
            runner: windows-latest
            goos: windows
            goarch: arm64
            ext: .exe
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Print environment
        run: |
          echo "Building for ${{ matrix.goos }}/$${{ matrix.goarch }} on ${{ matrix.runner }}"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          set -eux
          mkdir -p dist out
          BINARY_NAME="conduit${{ matrix.ext }}"
          echo "building $BINARY_NAME"
          GOOS=${GOOS} GOARCH=${GOARCH} CGO_ENABLED=${CGO_ENABLED} go build -o dist/${BINARY_NAME} ./...
          TAG=${{ github.event.release.tag_name }}
          ARTIFACT_NAME="${TAG}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}"
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar -C dist -czf out/${ARTIFACT_NAME} ${BINARY_NAME}
          else
            # zip for windows; on non-Windows runners zip is available
            zip -j out/${ARTIFACT_NAME} dist/${BINARY_NAME}
          fi
          echo "::set-output name=artifact::out/${ARTIFACT_NAME}"

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: out/${{ github.event.release.tag_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}
          asset_name: ${{ github.event.release.tag_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}
          asset_content_type: application/octet-stream
