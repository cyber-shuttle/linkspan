name: goreleaser dry-run

on:
  workflow_dispatch: {}
  pull_request:
    branches: [ main ]

jobs:
  dry-run:
    name: Goreleaser dry-run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Install goreleaser
        uses: goreleaser/goreleaser-action@v4
        with:
          version: latest
          args: --version

      - name: Run goreleaser dry-run (snapshot, skip publish)
        uses: goreleaser/goreleaser-action@v4
        with:
          version: latest
          args: release --snapshot --skip-publish --rm-dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dist for inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: goreleaser-dry-dist
          path: dist/**

      - name: Print dist contents (debug)
        if: always()
        run: |
          echo "dist listing:"
          ls -la dist || true
