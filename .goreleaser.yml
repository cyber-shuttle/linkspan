project_name: conduit
builds:
  - id: conduit
    main: ./
    binary: conduit
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s
      - -w
archives:
  - id: archive_default
    builds:
      - conduit
    format: tar.gz
    files:
      - LICENSE
      - README.md
    replacements:
      # windows builds will be created as zip via the archive overrides in the release step
      - when: GOOS=windows
        format: zip

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

release:
  github:
    # goreleaser will use the repository detected in the CI environment by default
    # owner: cyber-shuttle
    # name: conduit
  draft: false
  # Set to true to create a draft release rather than publishing immediately

brew:
  # Homebrew formula generation. Update 'tap' to your Homebrew tap (owner/repo).
  name: conduit
  tap:
    owner: cyber-shuttle
    name: homebrew-tap
  files:
    - conduit

snapcraft:
  # Snapcraft section will generate a snapcraft.yaml and attempt to build/publish.
  # Publishing to the Snap store requires credentials/snapcraft login configured
  name: conduit
  grade: stable
  confinement: classic

changelog:
  # Use the git tag's annotated message and commits to build the changelog
  use: git

archives:
  - id: artifacts
    builds:
      - conduit
    format: tar.gz
    files:
      - LICENSE
      - README.md

before:
  hooks:
    - go mod tidy

# Notes:
# - For Homebrew publishing, set the secret HOMEBREW_GITHUB_TOKEN in GitHub Actions
# - For Snap publishing, set SNAPCRAFT_TOKEN and configure the snapcraft deb packaging
# - For signing (optional), configure GPG keys and set GPG_PRIVATE_KEY and GPG_PASSPHRASE
